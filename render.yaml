services:
  - type: web
    name: opportunity-radar-api
    runtime: python
    plan: free
    buildCommand: python -m pip install -r requirements-backend.txt
    startCommand: python scripts/serve_backend.py --root . --host 0.0.0.0
    healthCheckPath: /health
    envVars:
      - key: OPPORTUNITY_API_TOKEN
        sync: false
      - key: OPPORTUNITY_RECIPIENTS
        sync: false
      - key: OPPORTUNITY_TIMEZONE
        value: America/Edmonton
      - key: OPPORTUNITY_SEND_DOW
        value: MON
      - key: OPPORTUNITY_SEND_HOUR
        value: "9"
      - key: OPPORTUNITY_MAX_JOBS
        value: "10"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_RANK_MODEL
        value: openai/gpt-4.1-mini
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WHATSAPP_CONTENT_SID
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: GITHUB_STATE_REPO
        sync: false
      - key: GITHUB_STATE_PATH
        value: opportunity-state.json
      - key: GITHUB_STATE_REF
        value: main
      - key: GITHUB_STATE_TOKEN
        sync: false
      - key: GITHUB_SOURCES_PATH
        value: sources.json

  - type: cron
    name: opportunity-radar-weekly
    runtime: python
    plan: starter
    schedule: '0 * * * MON'
    buildCommand: python -m pip install -r requirements-backend.txt
    startCommand: python scripts/run_weekly_digest.py --root . --send --respect-schedule
    envVars:
      - key: OPPORTUNITY_RECIPIENTS
        sync: false
      - key: OPPORTUNITY_TIMEZONE
        value: America/Edmonton
      - key: OPPORTUNITY_SEND_DOW
        value: MON
      - key: OPPORTUNITY_SEND_HOUR
        value: "9"
      - key: OPPORTUNITY_MAX_JOBS
        value: "10"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_RANK_MODEL
        value: openai/gpt-4.1-mini
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WHATSAPP_CONTENT_SID
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: GITHUB_STATE_REPO
        sync: false
      - key: GITHUB_STATE_PATH
        value: opportunity-state.json
      - key: GITHUB_STATE_REF
        value: main
      - key: GITHUB_STATE_TOKEN
        sync: false
      - key: GITHUB_SOURCES_PATH
        value: sources.json
