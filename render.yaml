services:
  - type: web
    name: schwarzman-qa
    runtime: python
    plan: free
    buildCommand: python -m pip install -r requirements-backend.txt
    startCommand: python scripts/serve_backend.py --root . --host 0.0.0.0
    healthCheckPath: /health
    envVars:
      - key: GITHUB_INDEX_REPO
        value: GarrettAudet/SchwarzmanQnA-Index
      - key: GITHUB_INDEX_PATH
        value: local-index.json
      - key: GITHUB_INDEX_REF
        value: main
      - key: GITHUB_INDEX_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_ANSWER_MODEL
        value: deepseek/deepseek-v4-flash
      - key: OPENROUTER_REVIEW_MODEL
        value: google/gemini-3.5-flash
