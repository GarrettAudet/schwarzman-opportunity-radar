# Default Blueprint: free Render web service only.
# Scheduled jobs run from GitHub Actions so the default Render deploy does not
# create paid cron services or require a card for cron billing.
services:
  - type: web
    name: opportunity-radar-api
    runtime: python
    plan: free
    buildCommand: python -m pip install -r requirements-backend.txt
    startCommand: python scripts/serve_backend.py --root . --host 0.0.0.0
    healthCheckPath: /health
    envVars:
      - key: OPPORTUNITY_API_TOKEN
        sync: false
      - key: OPPORTUNITY_RECIPIENTS
        sync: false
      - key: OPPORTUNITY_TIMEZONE
        value: America/Edmonton
      - key: OPPORTUNITY_SEND_DOW
        value: MON
      - key: OPPORTUNITY_SEND_HOUR
        value: "9"
      - key: OPPORTUNITY_MAX_JOBS
        value: "30"
      - key: OPPORTUNITY_MAX_JOBS_PER_COMPANY
        value: "2"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_RANK_MODEL
        value: openai/gpt-4.1-mini
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WHATSAPP_CONTENT_SID
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: GITHUB_STATE_REPO
        sync: false
      - key: GITHUB_STATE_PATH
        value: opportunity-state.json
      - key: GITHUB_STATE_REF
        value: main
      - key: GITHUB_STATE_TOKEN
        sync: false
      - key: GITHUB_DISCOVERY_PATH
        value: discovery.json
      - key: GITHUB_CONDITIONS_PATH
        value: conditions.json
