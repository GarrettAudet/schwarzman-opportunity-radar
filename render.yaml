services:
  - type: web
    name: schwarzman-qa
    runtime: python
    plan: free
    buildCommand: python -m pip install -r requirements-backend.txt
    startCommand: python scripts/serve_backend.py --root . --host 0.0.0.0
    healthCheckPath: /health
    envVars:
      - key: GITHUB_INDEX_REPO
        value: GarrettAudet/SchwarzmanQnA-Index
      - key: GITHUB_INDEX_PATH
        value: local-index.json
      - key: GITHUB_INDEX_REF
        value: main
      - key: GITHUB_INDEX_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_ANSWER_MODEL
        value: deepseek/deepseek-v4-flash
      - key: OPENROUTER_REVIEW_MODEL
        value: google/gemini-3.5-flash
      - key: SCHWARZMAN_API_TOKEN
        sync: false
      - key: WHATSAPP_INVITE_CODE
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_GRAPH_API_VERSION
        value: v23.0
      - key: WHATSAPP_ALLOWED_NUMBERS
        sync: false
      - key: WHATSAPP_BLOCKED_NUMBERS
        sync: false
      - key: WHATSAPP_ALLOWED_WA_IDS
        sync: false
      - key: WHATSAPP_BLOCKED_WA_IDS
        sync: false
      - key: GITHUB_ACCESS_REPO
        value: GarrettAudet/SchwarzmanQnA-Index
      - key: GITHUB_ACCESS_PATH
        value: whatsapp-access.json
      - key: GITHUB_ACCESS_REF
        value: main
      - key: GITHUB_ACCESS_TOKEN
        sync: false
